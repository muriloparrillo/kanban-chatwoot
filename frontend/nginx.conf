server {
  listen 80;
  server_name _;

  # Docker's internal DNS resolver — resolve upstreams at request time, not boot time.
  # EasyPanel internal hostname format: $(PROJECT_NAME)_$(SERVICE_NAME)
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_url http://vai-novofoco_kanban-chatwoot-backend:3000;

  # Allow embedding in Chatwoot iframe (configure to your Chatwoot domain in prod)
  add_header Content-Security-Policy "frame-ancestors 'self' https://*.chatwoot.com https://chatwoot.*;";
  add_header X-Frame-Options "";

  location /api/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
  }

  location /webhooks/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /uploads/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # Script de injeção — permite ser carregado pelo Chatwoot (CORS)
  location = /kanban-inject.js {
    root /usr/share/nginx/html;
    add_header Access-Control-Allow-Origin "*";
    add_header Cache-Control "no-cache, must-revalidate";
    add_header Content-Type "application/javascript; charset=utf-8";
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}

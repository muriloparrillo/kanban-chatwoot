server {
  listen 80;
  server_name _;

  # Allow embedding in Chatwoot iframe (configure to your Chatwoot domain in prod)
  add_header Content-Security-Policy "frame-ancestors 'self' https://*.chatwoot.com https://chatwoot.*;";
  add_header X-Frame-Options "";

  location /api/      { proxy_pass http://backend:3000; proxy_set_header Host $host; }
  location /webhooks/ { proxy_pass http://backend:3000; proxy_set_header Host $host; }
  location /uploads/  { proxy_pass http://backend:3000; proxy_set_header Host $host; }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}

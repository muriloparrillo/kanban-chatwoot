server {
  listen 80;
  server_name _;

  # Docker's internal DNS resolver — resolve upstreams at request time, not boot time.
  # This prevents nginx from crashing when "backend" isn't ready yet.
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $backend_url http://backend:3000;

  # Allow embedding in Chatwoot iframe (configure to your Chatwoot domain in prod)
  add_header Content-Security-Policy "frame-ancestors 'self' https://*.chatwoot.com https://chatwoot.*;";
  add_header X-Frame-Options "";

  location /api/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 5s;
    proxy_read_timeout    60s;
  }

  location /webhooks/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location /uploads/ {
    proxy_pass $backend_url;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}

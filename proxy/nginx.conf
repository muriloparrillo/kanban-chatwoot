server {
  listen 80;
  server_name _;

  # Resolver do Docker interno (EasyPanel usa Docker)
  resolver 127.0.0.11 valid=10s ipv6=off;
  set $chatwoot http://vai-novofoco_chatwoot:3000;

  # ── Sub-filter: injeta o script do CRM antes do </body> ────────────────
  # gunzip descomprime a resposta do Chatwoot antes de aplicar sub_filter
  gunzip on;

  sub_filter '</body>'
    '<script src="https://vai-novofoco-kanban-chatwoot-frontend.dutk9f.easypanel.host/kanban-inject.js" defer></script></body>';
  sub_filter_once on;

  # ── Proxy principal ──────────────────────────────────────────────────────
  location / {
    proxy_pass $chatwoot;

    proxy_http_version 1.1;

    # Headers padrão de proxy
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;

    # WebSocket (ActionCable do Chatwoot)
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";

    # Desativa compressão no request para gunzip + sub_filter funcionar
    proxy_set_header Accept-Encoding "";

    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;

    # Cache de buffers
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;
  }
}
